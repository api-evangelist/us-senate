naftiko: 1.0.0-alpha2
info:
  label: US Senate Lobbying Disclosure Act (LDA) API — Clients
  description: 'US Senate Lobbying Disclosure Act (LDA) API — Clients. 2 operations. Lead operation: List Lobbying Clients.
    Self-contained Naftiko capability covering one Us Senate business surface.'
  tags:
  - Us Senate
  - Clients
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_SENATE_API_KEY: US_SENATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: lda-clients
    baseUri: https://lda.senate.gov/api/v1
    description: US Senate Lobbying Disclosure Act (LDA) API — Clients business capability. Self-contained, no shared references.
    resources:
    - name: clients
      path: /clients/
      operations:
      - name: listclients
        method: GET
        description: List Lobbying Clients
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter by client name (partial match)
        - name: page
          in: query
          type: integer
        - name: format
          in: query
          type: string
    - name: clients-id
      path: /clients/{id}/
      operations:
      - name: getclient
        method: GET
        description: Get Client by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Client ID
          required: true
        - name: format
          in: query
          type: string
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.US_SENATE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: lda-clients-rest
    port: 8080
    description: REST adapter for US Senate Lobbying Disclosure Act (LDA) API — Clients. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/clients
      name: clients
      description: REST surface for clients.
      operations:
      - method: GET
        name: listclients
        description: List Lobbying Clients
        call: lda-clients.listclients
        with:
          name: rest.name
          page: rest.page
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/clients/{id}
      name: clients-id
      description: REST surface for clients-id.
      operations:
      - method: GET
        name: getclient
        description: Get Client by ID
        call: lda-clients.getclient
        with:
          id: rest.id
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lda-clients-mcp
    port: 9090
    transport: http
    description: MCP adapter for US Senate Lobbying Disclosure Act (LDA) API — Clients. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-lobbying-clients
      description: List Lobbying Clients
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lda-clients.listclients
      with:
        name: tools.name
        page: tools.page
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: get-client-id
      description: Get Client by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lda-clients.getclient
      with:
        id: tools.id
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
