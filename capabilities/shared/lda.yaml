naftiko: "1.0.0-alpha1"

info:
  label: "Senate Lobbying Disclosure Act (LDA) API"
  description: >-
    The Senate LDA API provides access to lobbying disclosure filings,
    registrant information, client records, and lobbyist profiles.
  tags:
    - Lobbying
    - Government Transparency
    - Federal Government
    - Open Data
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      LDA_API_KEY: LDA_API_KEY

capability:
  consumes:
    - type: http
      namespace: senate-lda
      baseUri: https://lda.senate.gov/api/v1
      description: "Senate LDA REST API for lobbying disclosure data."
      authentication:
        type: apikey
        key: Authorization
        value: "Token {{LDA_API_KEY}}"
        placement: header
      resources:
        - name: filings
          path: /filings/
          description: "Lobbying disclosure filings"
          operations:
            - name: list-filings
              method: GET
              description: "List lobbying disclosure filings with filtering"
              inputParameters:
                - name: filing_type
                  in: query
                  type: string
                  required: false
                  description: "Filing type code"
                - name: filing_year
                  in: query
                  type: integer
                  required: false
                  description: "Year of filing"
                - name: registrant_name
                  in: query
                  type: string
                  required: false
                  description: "Registrant name filter"
                - name: client_name
                  in: query
                  type: string
                  required: false
                  description: "Client name filter"
                - name: issue_code
                  in: query
                  type: string
                  required: false
                  description: "Lobbying issue code"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: filing-detail
          path: /filings/{filing_uuid}/
          description: "Individual filing record"
          operations:
            - name: get-filing
              method: GET
              description: "Get a specific filing by UUID"
              inputParameters:
                - name: filing_uuid
                  in: path
                  type: string
                  required: true
                  description: "Filing UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: registrants
          path: /registrants/
          description: "Lobbying registrants"
          operations:
            - name: list-registrants
              method: GET
              description: "List lobbying registrants"
              inputParameters:
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Name filter"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-registrant
              method: GET
              description: "Get a specific registrant by ID"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Registrant ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: clients
          path: /clients/
          description: "Lobbying clients"
          operations:
            - name: list-clients
              method: GET
              description: "List lobbying clients"
              inputParameters:
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Name filter"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: lobbyists
          path: /lobbyists/
          description: "Individual lobbyists"
          operations:
            - name: list-lobbyists
              method: GET
              description: "List lobbyists"
              inputParameters:
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Name filter"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: constants-issues
          path: /constants/filing/lobbyingactivityissues/
          description: "Lobbying issue codes"
          operations:
            - name: list-lobbying-issues
              method: GET
              description: "Get all lobbying activity issue codes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: constants-government
          path: /constants/filing/governmententities/
          description: "Government entity codes"
          operations:
            - name: list-government-entities
              method: GET
              description: "Get all lobbied government entity codes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: senate-lda-api
      resources:
        - path: /v1/filings
          name: filings
          description: "Lobbying disclosure filings"
          operations:
            - method: GET
              name: list-filings
              description: "List lobbying filings"
              call: "senate-lda.list-filings"
              with:
                filing_year: "rest.filing_year"
                filing_type: "rest.filing_type"
                issue_code: "rest.issue_code"
                page: "rest.page"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/registrants
          name: registrants
          description: "Lobbying registrants"
          operations:
            - method: GET
              name: list-registrants
              description: "List registrants"
              call: "senate-lda.list-registrants"
              with:
                name: "rest.name"
                page: "rest.page"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: senate-lda-mcp
      transport: http
      tools:
        - name: list-lobbying-filings
          description: "Search lobbying disclosure filings by year, period, registrant, client, or issue code"
          hints:
            readOnly: true
            openWorld: true
          call: "senate-lda.list-filings"
          with:
            filing_year: "tools.filing_year"
            filing_type: "tools.filing_type"
            issue_code: "tools.issue_code"
            registrant_name: "tools.registrant_name"
            client_name: "tools.client_name"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-lobbying-filing
          description: "Get a specific lobbying disclosure filing by UUID"
          hints:
            readOnly: true
            openWorld: false
          call: "senate-lda.get-filing"
          with:
            filing_uuid: "tools.filing_uuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-registrants
          description: "List lobbying firms and individual registrants"
          hints:
            readOnly: true
            openWorld: true
          call: "senate-lda.list-registrants"
          with:
            name: "tools.name"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-clients
          description: "List clients on whose behalf lobbying is conducted"
          hints:
            readOnly: true
            openWorld: true
          call: "senate-lda.list-clients"
          with:
            name: "tools.name"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-lobbyists
          description: "List individual registered lobbyists"
          hints:
            readOnly: true
            openWorld: true
          call: "senate-lda.list-lobbyists"
          with:
            name: "tools.name"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
