naftiko: 1.0.0-alpha2
info:
  label: US Senate Lobbying Disclosure Act (LDA) API — Registrants
  description: 'US Senate Lobbying Disclosure Act (LDA) API — Registrants. 2 operations. Lead operation: List Lobbying Registrants.
    Self-contained Naftiko capability covering one Us Senate business surface.'
  tags:
  - Us Senate
  - Registrants
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_SENATE_API_KEY: US_SENATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: lda-registrants
    baseUri: https://lda.senate.gov/api/v1
    description: US Senate Lobbying Disclosure Act (LDA) API — Registrants business capability. Self-contained, no shared
      references.
    resources:
    - name: registrants
      path: /registrants/
      operations:
      - name: listregistrants
        method: GET
        description: List Lobbying Registrants
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter by registrant name (partial match)
        - name: page
          in: query
          type: integer
        - name: format
          in: query
          type: string
    - name: registrants-id
      path: /registrants/{id}/
      operations:
      - name: getregistrant
        method: GET
        description: Get Registrant by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Registrant ID
          required: true
        - name: format
          in: query
          type: string
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.US_SENATE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: lda-registrants-rest
    port: 8080
    description: REST adapter for US Senate Lobbying Disclosure Act (LDA) API — Registrants. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/registrants
      name: registrants
      description: REST surface for registrants.
      operations:
      - method: GET
        name: listregistrants
        description: List Lobbying Registrants
        call: lda-registrants.listregistrants
        with:
          name: rest.name
          page: rest.page
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/registrants/{id}
      name: registrants-id
      description: REST surface for registrants-id.
      operations:
      - method: GET
        name: getregistrant
        description: Get Registrant by ID
        call: lda-registrants.getregistrant
        with:
          id: rest.id
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lda-registrants-mcp
    port: 9090
    transport: http
    description: MCP adapter for US Senate Lobbying Disclosure Act (LDA) API — Registrants. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-lobbying-registrants
      description: List Lobbying Registrants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lda-registrants.listregistrants
      with:
        name: tools.name
        page: tools.page
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: get-registrant-id
      description: Get Registrant by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lda-registrants.getregistrant
      with:
        id: tools.id
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
