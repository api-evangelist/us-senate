naftiko: 1.0.0-alpha2
info:
  label: US Senate Lobbying Disclosure Act (LDA) API — Lobbyists
  description: 'US Senate Lobbying Disclosure Act (LDA) API — Lobbyists. 2 operations. Lead operation: List Lobbyists. Self-contained
    Naftiko capability covering one Us Senate business surface.'
  tags:
  - Us Senate
  - Lobbyists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_SENATE_API_KEY: US_SENATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: lda-lobbyists
    baseUri: https://lda.senate.gov/api/v1
    description: US Senate Lobbying Disclosure Act (LDA) API — Lobbyists business capability. Self-contained, no shared references.
    resources:
    - name: lobbyists
      path: /lobbyists/
      operations:
      - name: listlobbyists
        method: GET
        description: List Lobbyists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter by lobbyist name (partial match)
        - name: page
          in: query
          type: integer
        - name: format
          in: query
          type: string
    - name: lobbyists-id
      path: /lobbyists/{id}/
      operations:
      - name: getlobbyist
        method: GET
        description: Get Lobbyist by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Lobbyist ID
          required: true
        - name: format
          in: query
          type: string
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.US_SENATE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: lda-lobbyists-rest
    port: 8080
    description: REST adapter for US Senate Lobbying Disclosure Act (LDA) API — Lobbyists. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/lobbyists
      name: lobbyists
      description: REST surface for lobbyists.
      operations:
      - method: GET
        name: listlobbyists
        description: List Lobbyists
        call: lda-lobbyists.listlobbyists
        with:
          name: rest.name
          page: rest.page
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lobbyists/{id}
      name: lobbyists-id
      description: REST surface for lobbyists-id.
      operations:
      - method: GET
        name: getlobbyist
        description: Get Lobbyist by ID
        call: lda-lobbyists.getlobbyist
        with:
          id: rest.id
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lda-lobbyists-mcp
    port: 9090
    transport: http
    description: MCP adapter for US Senate Lobbying Disclosure Act (LDA) API — Lobbyists. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-lobbyists
      description: List Lobbyists
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lda-lobbyists.listlobbyists
      with:
        name: tools.name
        page: tools.page
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: get-lobbyist-id
      description: Get Lobbyist by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lda-lobbyists.getlobbyist
      with:
        id: tools.id
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
