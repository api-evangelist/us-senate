        type: OpenAPI
    description: >-
      The Senate Lobbying Disclosure Act (LDA) REST API provides public access to lobbying disclosure filings,
      registrations, quarterly activity reports (LD-2), and semi-annual contribution reports (LD-203) submitted under
      the Lobbying Disclosure Act. Includes data on registrants, clients, lobbyists, and lobbying activities. An API key
      increases rate limits from 15 to 120 requests per minute.
