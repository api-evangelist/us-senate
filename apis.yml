description: >-
  The United States Senate is one of the two chambers of Congress, responsible for representing the interests of the
  individual states and ensuring that federal legislation is passed in a fair and representative manner. The Senate
  plays a crucial role in the legislative process, with its members debating and voting on bills and resolutions that
  affect the country as a whole. The Senate also administers the Lobbying Disclosure Act (LDA) reporting system, which
  requires lobbyists and lobbying firms to register and report their activities, clients, and campaign contributions for
  public transparency.
features:
  - Lobbying Filing Search and Retrieval
  - Registrant Information
  - Client Information
  - Lobbyist Profiles
  - Campaign Contribution Reports
  - Reference Data (Issue Codes, Government Entities)
